behaviors:
  ControllerForTrain:
    trainer_type: ppo
    hyperparameters:
      learning_rate: 3.0e-4
      learning_rate_schedule: linear
      batch_size: 512
      buffer_size: 2048
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
    network_settings:
      num_layers: 2
      hidden_units: 128
      normalize: true
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    max_steps: 500000
    time_horizon: 64
    summary_freq: 200
    checkpoint_interval: 50000

  VoidbornBoss:
    trainer_type: ppo
    hyperparameters:
      learning_rate: 3.0e-4
      learning_rate_schedule: linear
      batch_size: 512
      buffer_size: 2048
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
    network_settings:
      num_layers: 2
      hidden_units: 128
      normalize: true
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    max_steps: 1
    time_horizon: 64
    summary_freq: 100
    checkpoint_interval: 50000
